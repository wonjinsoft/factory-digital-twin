# podman compose 용 — version 필드 생략
services:
  # ─── Redis ───────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: factory_redis
    ports:
      - "6379:6379"
    hostname: redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI ─────────────────────────────────────
  api:
    build: ./api
    container_name: factory_api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_PORT=8000
      - SITE_ID=site1
    volumes:
      - ./api:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  # ─── Redis Exporter (Redis 메트릭 수집) ──────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: factory_redis_exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    restart: always

  # ─── Prometheus (메트릭 저장) ─────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: factory_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: always

  # ─── Grafana (시각화) ─────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: factory_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

volumes:
  grafana_data: