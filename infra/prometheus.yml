# 파일: infra/prometheus.yml
# 역할: Prometheus 메트릭 수집 설정

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ─── Redis 메트릭 ─────────────────────────────
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  # ─── FastAPI 메트릭 ───────────────────────────
  - job_name: "fastapi"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"